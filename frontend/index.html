<!doctype html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>小红书评论广告助手</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#003c73",
              "primary-container": "#00539c",
              secondary: "#006b5c",
              "secondary-container": "#68fadd",
              surface: "#f7f9fb",
              "surface-container-low": "#f2f4f6",
              "surface-container-lowest": "#ffffff",
              "surface-container-high": "#e6e8ea",
              "surface-container-highest": "#e0e3e5",
              "on-surface": "#191c1e",
              "on-surface-variant": "#424751",
              "tertiary-container": "#465272",
              "on-tertiary-container": "#bac6ec",
              error: "#ba1a1a",
              "outline-variant": "#c2c6d3"
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"]
            }
          }
        }
      };
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
      .active-fill { font-variation-settings: "FILL" 1, "wght" 600, "GRAD" 0, "opsz" 24; }
      .signature-gradient { background: linear-gradient(135deg, #003c73 0%, #00539c 100%); }
      .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(24px); }
    </style>
  </head>
  <body class="bg-surface font-body text-on-surface">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
